version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: final_frontier_db
    environment:
      POSTGRES_USER: codejourney
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: final_frontier
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codejourney"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: final_frontier_backend
    environment:
      DATABASE_URL: postgresql://codejourney:dev_password@postgres/final_frontier
      SECRET_KEY: dev-secret-key-change-in-production
      DEBUG: "false"
      HOST: 0.0.0.0
      PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./models:/app/models
    command: python -m backend.app

  # Frontend (Simple HTTP Server)
  frontend:
    image: python:3.11-slim
    container_name: final_frontier_frontend
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    command: python -m http.server 3000

volumes:
  postgres_data:
